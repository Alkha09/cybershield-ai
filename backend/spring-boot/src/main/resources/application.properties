# Application
spring.application.name=cybershield-api
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cybershield}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:cybershield-default-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ML Service
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# Logging
logging.level.org.springframework.security=INFO
